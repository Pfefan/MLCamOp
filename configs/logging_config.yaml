loggers:
  version: 1
  disable_existing_loggers: false

  formatters:
    simple:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    detailed:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s - %(filename)s:%(lineno)d'

  handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
      formatter: simple

    file:
      class: logging.FileHandler
      level: INFO
      formatter: detailed
      filename: logs/concert_video_editor.log

  loggers:
    concert_video_editor:
      level: DEBUG
      handlers: [console, file]
      propagate: no

root:
  level: WARNING
  handlers: [console]