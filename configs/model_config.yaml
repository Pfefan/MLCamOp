# ─────────────────────────────────────────────────────────────────────────────
# Video paths
#
# Add more concerts to the list as you record them.  Each entry needs the three
# simultaneous recordings: wide shot (total_view), close-up camera (closeup),
# and the human-edited final cut (result).
#
# The sampler builds a separate cache file per concert (keyed by path + settings)
# so adding a new concert never invalidates existing caches — it just adds one
# new cache file.  Set force_rebuild: true only if you change sample_fps or
# similarity_threshold.
# ─────────────────────────────────────────────────────────────────────────────
data:
  concerts:
    - total_view:          "/mnt/Data/Job/Projekte/CutStudio/03_StadtkapelleWeiz_20251116/totalle_StadtkapelleWeiz_20251116_00004162.mp4"
      closeup:             "/mnt/Data/Job/Projekte/CutStudio/03_StadtkapelleWeiz_20251116/closeup_StadtkapelleWeiz_20251116_00004162.mp4"
      result:              "/mnt/Data/Job/Projekte/CutStudio/03_StadtkapelleWeiz_20251116/schnitt_StadtkapelleWeiz_20251116_00000000.mp4"
      similarity_threshold: 31.1

    - total_view:          "/mnt/Data/Job/Projekte/CutStudio/05_TriotronikMesse2025/totalle.mp4"
      closeup:             "/mnt/Data/Job/Projekte/CutStudio/05_TriotronikMesse2025/closeup.mp4"
      result:              "/mnt/Data/Job/Projekte/CutStudio/05_TriotronikMesse2025/rec.mp4"
      similarity_threshold: 42.5

    - total_view:          "/mnt/Data/Job/Projekte/CutStudio/04_Ubahnorchesterfuerstenfeld_20250830/TOTALLE_04_Ubahnorchesterfuerstenfeld_20250830.mp4"
      closeup:             "/mnt/Data/Job/Projekte/CutStudio/04_Ubahnorchesterfuerstenfeld_20250830/CLOSEUP_04_Ubahnorchesterfuerstenfeld_20250830.mp4"
      result:              "/mnt/Data/Job/Projekte/CutStudio/04_Ubahnorchesterfuerstenfeld_20250830/SCHNITT_04_Ubahnorchesterfuerstenfeld_20250830.mp4"
      similarity_threshold: 25.4

    # Add future concerts here, e.g.:
    # - total_view:          "E:/Job/Projekte/CutStudio/05_SomeConcert/TOTALLE.mp4"
    #   closeup:             "E:/Job/Projekte/CutStudio/05_SomeConcert/CLOSEUP.mp4"
    #   result:              "E:/Job/Projekte/CutStudio/05_SomeConcert/SCHNITT.mp4"
    #   similarity_threshold: 39  # TODO: run tune_threshold.py --concert N

  # Frames per second to sample from video.
  # This is the single biggest RAM knob — halving it halves dataset size:
  #   2.0 fps × 3 concerts ≈ 19 GB  (requires ~24 GB free RAM)
  #   1.0 fps × 3 concerts ≈  9 GB  (fits on 12 GB free RAM)
  #   0.5 fps × 3 concerts ≈  5 GB  (fits on 8 GB free RAM)
  # Changing this invalidates the cache and forces a full re-sample.
  sample_fps: 2.0

  # Preprocessed frame cache — avoids re-reading videos on every run.
  cache_dir:    "data/cache"
  force_rebuild: false

# ─────────────────────────────────────────────────────────────────────────────
# Training hyperparameters
# ─────────────────────────────────────────────────────────────────────────────
training:
  epochs:        60
  batch_size:    128
  learning_rate: 0.0005      # head LR; backbone gets lr/10 and lr/100
  val_split:     0.2
  patience:      8

  # RAM tuning:
  #   num_workers: 2    default — forked workers share frame data via COW.
  #                     Set to 0 to disable forking entirely (slower training,
  #                     but no forked copies of the frame buffer).
  #   low_memory: true  overrides num_workers to 0 AND halves batch_size.
  #                     Use on systems with < 16 GB free RAM.
  num_workers: 4
  low_memory:  false

# ─────────────────────────────────────────────────────────────────────────────
# Model
# ─────────────────────────────────────────────────────────────────────────────
model:
  name:        ViewClassifier
  backbone:    mobilenet_v3_small
  num_classes: 2
  input_size:  [224, 224]
  checkpoint:  "models/view_classifier.pt"

# ─────────────────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────────────────
logging:
  log_file: "logs/training.log"
  level:    INFO

