pipeline:
  ingestion:
    video_paths:
      - path/to/total_view_video.mp4
      - path/to/close_up_video.mp4
    frame_rate: 30
  inference:
    model_paths:
      view_classifier: path/to/view_classifier_model.h5
      scene_detector: path/to/scene_detector_model.h5
    confidence_threshold: 0.5
  editing:
    transition_duration: 1.0
    output_resolution:
      width: 1920
      height: 1080
    output_format: mp4
    output_path: path/to/final_output_video.mp4